<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="portfolio">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff" />
      <stop offset="0.5" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#ff2d95" />
    </linearGradient>
  </defs>
  <!-- グラデーションの枠 + ダーク背景 -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#ring)" />
  <rect x="2.5" y="2.5" width="27" height="27" rx="5.5" fill="#0a0e1a" />
  <!-- ターミナルプロンプト >_ -->
  <polyline
    points="9,10 15,16 9,22"
    fill="none"
    stroke="#00e5ff"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <rect x="16.5" y="20" width="7.5" height="2.6" rx="1.3" fill="#00e5ff" />
</svg>
